version: '3'

tasks:
  link:
    desc: Symlink every skill into your Claude skills dir (authoring machine — re-run after adding a skill)
    cmds:
      - bash scripts/link-skills.sh {{.CLI_ARGS}}

  test:
    desc: Run the node --test suites across all skills
    cmds:
      - node --test 'skills/*/tests/*.test.mjs'

  lint:sh:
    desc: Shellcheck the helper scripts (errors only — block on real bugs, not style)
    cmds:
      - shellcheck --severity=error scripts/*.sh

  ci:
    desc: Full CI gate — tests plus shell lint
    deps: [test, lint:sh]
